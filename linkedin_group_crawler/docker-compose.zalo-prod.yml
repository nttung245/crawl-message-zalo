services:
  zalo-browser:
    build:
      context: .
      dockerfile: Dockerfile.vnc
    container_name: zalo-browser
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_KEY: ${API_KEY:?Set API_KEY in .env before starting Zalo}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ZALO_CORS_ORIGINS: ${ZALO_CORS_ORIGINS:-http://localhost:3000}
      ZALO_BROWSER_HEADLESS: "false"
      ZALO_BROWSER_PERSISTENT_PROFILE: "true"
      ZALO_BROWSER_USER_DATA_DIR: /app/storage/chromium-profile
      ZALO_BROWSER_REMOTE_VIEWER_URL: ""
      ZALO_VNC_ENABLED: "false"
      ZALO_AUTO_OPEN_ON_START: "false"
      PLAYWRIGHT_WARMUP_ON_STARTUP: "false"
      DISPLAY: ":99"
    command:
      - /app/scripts/start_zalo_vnc.sh
    expose:
      - "8000"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./credentials:/app/credentials
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  zalo-api:
    build:
      context: .
      dockerfile: Dockerfile.vnc
    container_name: zalo-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_KEY: ${API_KEY:?Set API_KEY in .env before starting Zalo}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ZALO_BROWSER_SERVICE_URL: http://zalo-browser:8000
      PLAYWRIGHT_WARMUP_ON_STARTUP: "false"
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "${ZALO_API_WORKERS:-4}"
    ports:
      - "${ZALO_API_BIND:-127.0.0.1}:8000:8000"
    depends_on:
      zalo-browser:
        condition: service_healthy

version: "3.9"

services:
  zalo-api-vnc:
    build:
      context: .
      dockerfile: Dockerfile.vnc
    container_name: zalo-api-vnc
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_KEY: ${API_KEY:?Set API_KEY in .env before starting Zalo API}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ZALO_CORS_ORIGINS: ${ZALO_CORS_ORIGINS:-http://localhost:3000}
      ZALO_BROWSER_HEADLESS: "false"
      ZALO_BROWSER_PERSISTENT_PROFILE: "true"
      ZALO_BROWSER_USER_DATA_DIR: /app/storage/chromium-profile
      ZALO_BROWSER_REMOTE_VIEWER_URL: ${ZALO_BROWSER_REMOTE_VIEWER_URL:-http://localhost:6080/vnc.html?autoconnect=true&reconnect=true&resize=scale&show_dot=true}
      ZALO_VNC_PASSWORD: ${ZALO_VNC_PASSWORD:?Set ZALO_VNC_PASSWORD in .env before starting Zalo VNC}
      ZALO_VNC_ENABLED: "true"
      ZALO_AUTO_OPEN_ON_START: "false"
      DISPLAY: ":99"
    ports:
      - "${ZALO_API_BIND:-127.0.0.1}:8000:8000"
      - "${ZALO_VNC_BIND:-127.0.0.1}:5900:5900"
      - "${ZALO_NOVNC_BIND:-127.0.0.1}:6080:6080"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./credentials:/app/credentials
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
